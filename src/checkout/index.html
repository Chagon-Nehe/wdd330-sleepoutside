<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="../css/style.css" />

  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <div class="alerts"></div>

  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>

      <div class="checkout-wrapper">
        <!-- Order Summary -->
        <div class="checkout-summary">
          <h3>Order Summary</h3>
          <ul class="cart-items-summary"></ul>
          <div class="order-summary">
            <p>Items: <span id="num-items">0</span></p>
            <p>Subtotal: <span id="cartTotal">$0.00</span></p>
            <p>Shipping: <span id="shipping">$0.00</span></p>
            <p>Tax: <span id="tax">$0.00</span></p>
            <p class="order-total">Total: <span id="orderTotal">$0.00</span></p>
          </div>
        </div>

        <!-- Checkout Form -->
        <form name="checkout" class="checkout-form">
          <h3>Shipping Information</h3>

          <div class="form-group">
            <label for="first">First Name *</label>
            <input type="text" id="first" name="first" required />
          </div>

          <div class="form-group">
            <label for="last">Last Name *</label>
            <input type="text" id="last" name="last" required />
          </div>

          <div class="form-group">
            <label for="street">Street Address *</label>
            <input type="text" id="street" name="street" required />
          </div>

          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" required />
          </div>

          <div class="form-group">
            <label for="state">State *</label>
            <input type="text" id="state" name="state" required />
          </div>

          <div class="form-group">
            <label for="zip">ZIP Code *</label>
            <input type="text" id="zip" name="zip" required />
          </div>

          <h3>Billing Information</h3>

          <div class="form-group">
            <label for="cardNumber">Card Number *</label>
            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required />
          </div>

          <div class="form-group">
            <label for="expiry">Expiry Date *</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required />
          </div>

          <div class="form-group">
            <label for="cvv">CVV *</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" required />
          </div>

          <button type="submit" id="checkoutSubmit" class="btn-submit">
            Place Order
          </button>
        </form>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>

</html>
